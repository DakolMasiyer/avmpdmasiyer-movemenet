<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — PMM 2027</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/logo/pmm-favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d1a10;color:white;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
    .num{font-family:'Cormorant Garamond',serif;font-size:110px;font-weight:700;color:rgba(245,196,28,0.25);line-height:1;}
    h1{font-family:'Cormorant Garamond',serif;font-size:34px;color:white;margin:14px 0 10px;}
    p{color:rgba(255,255,255,0.45);font-size:15px;margin-bottom:32px;line-height:1.7;max-width:420px;margin-left:auto;margin-right:auto;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;background:#F5C41C;color:#0d1a10;border-radius:6px;font-weight:700;font-size:14px;text-decoration:none;transition:background 0.2s;}
    .btn:hover{background:#ffd740;}
    .tagline{margin-top:44px;font-size:13px;font-style:italic;color:rgba(245,196,28,0.38);}
  </style>
</head>
<body>
  <div>
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. Let's get you back to the movement.</p>
    <a href="/" class="btn">← Back to Homepage</a>
    <div class="tagline">"Service is the promise we make, and unity is the strength that fulfills it"</div>
  </div>
</body>
</html>
