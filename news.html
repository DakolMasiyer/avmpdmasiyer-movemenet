  <style>
    .filter-bar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:36px;}
    .filter-btn{padding:7px 18px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;transition:var(--transition);border:1px solid var(--border);color:var(--ink-muted);background:white;font-family:'Outfit',sans-serif;}
    .filter-btn:hover,.filter-btn.active{background:var(--green);color:white;border-color:var(--green);}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,26,16,0.88);z-index:2000;backdrop-filter:blur(8px);align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:white;border-radius:var(--radius-lg);max-width:740px;width:100%;position:relative;overflow:hidden;}
    .modal-header{background:var(--green);padding:36px;position:relative;}
    .modal-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(245,196,28,0.12),transparent 60%);}
    .modal-close{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);color:white;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.18);transition:var(--transition);z-index:1;}
    .modal-close:hover{background:rgba(255,255,255,0.2);}
    .modal-cat{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:9px;position:relative;z-index:1;}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,3vw,30px);font-weight:700;color:white;position:relative;z-index:1;line-height:1.2;}
    .modal-date{font-family:'DM Mono',monospace;font-size:10.5px;color:rgba(255,255,255,0.38);margin-top:10px;position:relative;z-index:1;}
    .modal-body{padding:36px;}
    .modal-body p{font-size:14.5px;color:var(--ink-mid);margin-bottom:14px;line-height:1.8;}
    .modal-body ul{padding-left:18px;margin-bottom:14px;}
    .modal-body ul li{font-size:14.5px;color:var(--ink-mid);margin-bottom:7px;}
    .modal-footer{padding:22px 36px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .modal-footer .share-label{font-size:11.5px;color:var(--ink-muted);font-family:'DM Mono',monospace;}
    #modal-tags{display:flex;gap:7px;flex-wrap:wrap;margin:0 36px 22px;}
  </style>
</head>
